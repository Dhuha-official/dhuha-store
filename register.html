<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Daftar | DHUHA</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">

<a href="index.html">

<img src="images/logo.png">

</a>

</div>

</header>

<section class="auth-page">

<h1>Buat Akun</h1>

<p>Daftar untuk mulai berbelanja di DHUHA.</p>

<input
type="text"
id="register-name"
placeholder="Nama Lengkap">

<input
type="email"
id="register-email"
placeholder="Email">

<input
type="password"
id="register-password"
placeholder="Password">

<input
type="password"
id="register-confirm"
placeholder="Konfirmasi Password">

<button
id="register-btn"
class="buy-btn">

Daftar

</button>

<p class="auth-link">

Sudah punya akun?

<a href="login.html">

Masuk

</a>

</p>

  <script src="js/register.js"></script>

<script>

lucide.createIcons();

</script>

</body>

</html>
</section>
