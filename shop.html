<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHUHA | Shop</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/shop.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">

<a href="index.html">

<img src="images/Logo DH.png" alt="DHUHA">

</a>

</div>

<div class="header-icons">

<a href="https://instagram.com/official.dhuha"
target="_blank"
class="icon-btn"
aria-label="Instagram">

<svg xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<rect x="2" y="2" width="20" height="20" rx="5"/>

<circle cx="12" cy="12" r="4"/>

<circle cx="17.5" cy="6.5" r="1.3"
fill="currentColor"
stroke="none"/>

</svg>

</a>

<a href="https://tiktok.com/@official.dhuha"
target="_blank"
class="icon-btn"
aria-label="TikTok">

<svg xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="currentColor">

<path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.237h-3.2v13.263a2.889 2.889 0 1 1-2-2.723V9.667a6.4 6.4 0 1 0 5.2 6.278V8.827a8.19 8.19 0 0 0 4.77 1.526V6.686z"/>

</svg>

</a>

</div>

</header>
<section class="shop-banner">

<img src="images/banner-shop.png">

<div class="shop-overlay">

<h1>

DHUHA COLLECTION

</h1>

<p>

Built With Faith

</p>

</div>

</section>

<section class="shop-toolbar">

<button id="filterBtn">

<i data-lucide="sliders-horizontal"></i>

Filter

</button>

<button id="sortBtn">

<i data-lucide="arrow-up-down"></i>

Urutkan

</button>

</section>

<section class="shop-search">

<input
type="text"
id="searchInput"
placeholder="Cari produk...">

</section>

<section class="shop-products">

<div id="product-list">

</div>

</section>
<div class="bottom-sheet" id="filterSheet">

<div class="sheet-header">

<h2>Kategori</h2>

</div>

<div class="sheet-content">

<button class="filter-item" data-category="Semua">Semua</button>

<button class="filter-item" data-category="Kaos">Kaos</button>

<button class="filter-item" data-category="Polo">Polo</button>

<button class="filter-item" data-category="Kemeja">Kemeja</button>

<button class="filter-item" data-category="Co-Ord Collection">Co-Ord Collection</button>

<button class="filter-item" data-category="Sportwear">Sportwear</button>

<button class="filter-item" data-category="Parfum">Parfum</button>

<button class="filter-item" data-category="Aksesoris">Aksesoris</button>

</div>

</div>
  <div class="bottom-sheet" id="sortSheet">

<div class="sheet-header">

<h2>Urutkan</h2>

</div>

<div class="sheet-content">

<button class="sort-item" data-sort="newest">Terbaru</button>

<button class="sort-item" data-sort="low">Harga Termurah</button>

<button class="sort-item" data-sort="high">Harga Termahal</button>

<button class="sort-item" data-sort="az">Nama A–Z</button>

<button class="sort-item" data-sort="za">Nama Z–A</button>

</div>

  </div>

<script src="js/shop.js"></script>
<script src="js/navigation.js"></script>
<script src="js/header.js"></script>
<script src="js/cart-badge.js"></script>
  
<nav class="bottom-nav">

<a href="index.html" class="nav-item">
<i data-lucide="house"></i>
<span>Home</span>
</a>

<a href="shop.html" class="nav-item">
<i data-lucide="shopping-bag"></i>
<span>Shop</span>
</a>

<a href="wishlist.html" class="nav-item">
<i data-lucide="heart"></i>
<span>Wishlist</span>
</a>

<a href="cart.html" class="nav-item">
<i data-lucide="shopping-cart"></i>
<span>Cart</span>
</a>

<a href="account.html" class="nav-item">
<i data-lucide="user"></i>
<span>Akun</span>
</a>

</nav>

<script src="js/supabase.js"></script>

lucide.createIcons();

  </script>
</body>

</html>
