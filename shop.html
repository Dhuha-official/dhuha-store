<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHUHA | Shop</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">
<a href="index.html">
<img src="images/Logo DH.png" alt="DHUHA">
</a>
</div>

<nav class="nav-icons">

<a href="index.html">
<i data-lucide="house"></i>
</a>

<a href="account.html">
<i data-lucide="user"></i>
</a>

<a href="cart.html">
<i data-lucide="shopping-bag"></i>
</a>

</nav>

</header>

<section class="shop-hero">

<img src="images/Logo DH.png" class="shop-logo" alt="DHUHA">

<p class="shop-slogan">
Built With Faith
</p>

</section>

<section class="toolbar">

<button id="filterBtn">

<i data-lucide="sliders-horizontal"></i>

<span>Filter</span>

</button>

</section>

<div class="filter-modal" id="filterModal">

<div class="filter-content">

<h3>Filter Kategori</h3>

<button class="category-btn active" data-category="Semua">Semua</button>

<button class="category-btn" data-category="Kaos">Kaos</button>

<button class="category-btn" data-category="Polo">Polo</button>

<button class="category-btn" data-category="Kemeja">Kemeja</button>

<button class="category-btn" data-category="Oneset">Oneset</button>

<button class="category-btn" data-category="Sportwear">Sportwear</button>

<button class="category-btn" data-category="Parfum">Parfum</button>

<button class="category-btn" data-category="Topi">Topi</button>

<button class="category-btn" data-category="Sandal">Sandal</button>

</div>

</div>

<section class="products">

<div id="product-list"></div>

</section>
<script src="js/app.js"></script>

<script>

lucide.createIcons();

const filterBtn = document.getElementById("filterBtn");
const filterModal = document.getElementById("filterModal");

filterBtn.addEventListener("click", () => {
    filterModal.classList.toggle("show");
});

document.querySelectorAll(".category-btn").forEach(button => {

    button.addEventListener("click", () => {

        document
            .querySelectorAll(".category-btn")
            .forEach(btn => btn.classList.remove("active"));

        button.classList.add("active");

        filterModal.classList.remove("show");

        if (typeof filterProducts === "function") {
            filterProducts(button.dataset.category);
        }

    });

});

</script>

</body>
    </html>
