<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHUHA | Shop</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/shop.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">

<a href="index.html">

<img src="images/logo.png">

</a>

</div>

<div class="header-icons">

<button class="icon-btn">

<a href="search.html" class="icon-btn">

<i data-lucide="search"></i>

</a>

</button>

<a href="account.html" class="icon-btn">

<i data-lucide="user"></i>

</a>

<a href="cart.html" class="icon-btn cart-icon">

<i data-lucide="shopping-bag"></i>

<span id="cart-count">0</span>

</a>

</div>

</header>

<section class="shop-banner">

<img src="images/banner-shop.jpg">

<div class="shop-overlay">

<h1>

DHUHA COLLECTION

</h1>

<p>

Built With Faith

</p>

</div>

</section>

<section class="shop-toolbar">

<button id="filterBtn">

<i data-lucide="sliders-horizontal"></i>

Filter

</button>

<button id="sortBtn">

<i data-lucide="arrow-up-down"></i>

Urutkan

</button>

</section>

<section class="shop-search">

<input
type="text"
id="searchInput"
placeholder="Cari produk...">

</section>

<section class="shop-products">

<div id="product-list">

</div>

</section>
<div class="bottom-sheet" id="filterSheet">

<div class="sheet-header">

<h2>

Kategori

</h2>

</div>

<div class="sheet-body">

<button data-category="Semua">
<button data-category="Semua">Semua</button>
<button data-category="Kaos">Kaos</button>
<button data-category="Polo">Polo</button>
<button data-category="Kemeja">Kemeja</button>
<button data-category="Co-Ord Collection">Co-Ord Collection</button>
<button data-category="Sportwear">Sportwear</button>
<button data-category="Parfum">Parfum</button>
<button data-category="Aksesoris">Aksesoris</button>

</div>

</div>

<script src="js/shop.js"></script>
<script src="js/navigation.js"></script>
<script src="js/header.js"></script>
<script src="js/cart-badge.js"></script>
  
<script>

lucide.createIcons();

</script>
<nav class="bottom-nav">

<a href="index.html" class="nav-item">
<i data-lucide="house"></i>
<span>Home</span>
</a>

<a href="shop.html" class="nav-item">
<i data-lucide="shopping-bag"></i>
<span>Shop</span>
</a>

<a href="wishlist.html" class="nav-item">
<i data-lucide="heart"></i>
<span>Wishlist</span>
</a>

<a href="cart.html" class="nav-item">
<i data-lucide="shopping-cart"></i>
<span>Cart</span>
</a>

<a href="account.html" class="nav-item">
<i data-lucide="user"></i>
<span>Akun</span>
</a>

</nav>
</body>

</html>
