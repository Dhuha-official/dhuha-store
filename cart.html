<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang | DHUHA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<div class="logo">DHUHA</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
<a href="login.html">Account</a>
</nav>

</header>

<section class="cart-page">

<h1>Keranjang Belanja</h1>

<div id="cart-list"></div>

<h2 id="cart-total">Total : Rp0</h2>
</div>

</div>

<h2>Total : Rp149.000</h2>

<a href="checkout.html" class="checkout-btn">
Checkout
</a>

</section>
<script src="products.js"></script>
<script src="app.js"></script>

<script>

const cart = JSON.parse(localStorage.getItem("cart")) || [];
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartList = document.getElementById("cart-list");

let total = 0;

cartList.innerHTML = "";

cart.forEach((product,index)=>{

const harga = Number(product.price.replace(/[^\d]/g,""));

const subtotal = harga * product.qty;

total += subtotal;

cartList.innerHTML += `

<div class="cart-item">

<img src="${product.image}" alt="${product.name}">

<div>

<h2>${product.name}</h2>

<p>${product.price}</p>

<p>Qty : ${product.qty}</p>

<p>Subtotal : Rp${subtotal.toLocaleString("id-ID")}</p>

<button onclick="kurang(${index})">-</button>

<button onclick="tambah(${index})">+</button>

<button onclick="hapus(${index})">Hapus</button>

</div>

</div>

`;

});

document.getElementById("cart-total").innerText =
"Total : Rp" + total.toLocaleString("id-ID");

function tambah(index){
cart[index].qty++;
localStorage.setItem("cart",JSON.stringify(cart));
location.reload();
}

function kurang(index){

if(cart[index].qty>1){
cart[index].qty--;
}else{
cart.splice(index,1);
}

localStorage.setItem("cart",JSON.stringify(cart));
location.reload();

}

function hapus(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
location.reload();
}

</script>
             </script>
</body>

</html>
