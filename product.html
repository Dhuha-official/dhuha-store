<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>DHUHA | Product</title>

<link rel="stylesheet"
href="css/style.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">

<a href="index.html">

<img src="images/logo.png">

</a>

</div>

<div class="header-icons">

<a href="shop.html"
class="icon-btn">

<i data-lucide="arrow-left"></i>

</a>

<a href="cart.html" class="icon-btn cart-icon">

<i data-lucide="shopping-bag"></i>

<span id="cart-count">0</span>

</a>

</div>

</header>

<section class="product-page">

<div class="product-slider">

<img
id="product-image"
src="">

</div>

<div class="product-detail">

<h1 id="product-name"></h1>

<div
class="price"
id="product-price">

</div>

<p
id="product-description">

</p>
<div class="size-title">

Ukuran

</div>

<div class="size-list">

<button>S</button>

<button>M</button>

<button>L</button>

<button>XL</button>

</div>

<div class="color-title">

Warna

</div>

<div class="color-list">

<div class="color black"></div>

<div class="color white"></div>

<div class="color beige"></div>

</div>

<div class="qty">

<button id="minus">

−

</button>

<span id="qty">

1

</span>

<button id="plus">

+

</button>

</div>

<button
id="add-cart"
class="buy-btn">

Tambah ke Keranjang

</button>
<button
id="wishlist-btn"
class="wishlist-btn">

❤️ Tambah ke Wishlist

</button>
<button
class="checkout-btn">

Beli Sekarang

</button>

</div>

</section>
<section class="related">

<h2>

Produk Lainnya

</h2>

<div
id="related-products">

</div>

</section>

<script src="js/product.js"></script>
<script src="js/navigation.js"></script>
<script src="js/header.js"></script>
  
<script>

lucide.createIcons();

</script>
<nav class="bottom-nav">

<a href="index.html" class="nav-item">
<i data-lucide="house"></i>
<span>Home</span>
</a>

<a href="shop.html" class="nav-item">
<i data-lucide="shopping-bag"></i>
<span>Shop</span>
</a>

<a href="wishlist.html" class="nav-item">
<i data-lucide="heart"></i>
<span>Wishlist</span>
</a>

<a href="cart.html" class="nav-item">
<i data-lucide="shopping-cart"></i>
<span>Cart</span>
</a>

<a href="account.html" class="nav-item">
<i data-lucide="user"></i>
<span>Akun</span>
</a>

</nav>
</body>

</html>
