<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Checkout | DHUHA</title>

<link rel="stylesheet"
href="css/style.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="header">

<div class="logo">

<a href="index.html">

<img src="images/logo.png">

</a>

</div>

<div class="header-icons">

<a href="cart.html"
class="icon-btn">

<i data-lucide="arrow-left"></i>

</a>

</div>

</header>

<section class="checkout">

<h2>

Checkout

</h2>

<div class="checkout-card">

<h3>

Informasi Penerima

</h3>

<input
type="text"
placeholder="Nama Lengkap">

<input
type="text"
placeholder="Nomor WhatsApp">

<textarea
placeholder="Alamat Lengkap"></textarea>

</div>
<div class="checkout-card">

<h3>

Metode Pengiriman

</h3>

<label>

<input
type="radio"
name="shipping"
checked>

JNE

</label>

<label>

<input
type="radio"
name="shipping">

J&T

</label>

<label>

<input
type="radio"
name="shipping">

SiCepat

</label>

</div>

<div class="checkout-card">

<h3>

Metode Pembayaran

</h3>

<label>

<input
type="radio"
name="payment"
checked>

Transfer Bank

</label>

<label>

<input
type="radio"
name="payment">

QRIS

</label>

<label>

<input
type="radio"
name="payment">

COD

</label>

</div>
<div class="checkout-card">

<h3>

Ringkasan Belanja

</h3>

<div id="checkout-list">

</div>

<div class="checkout-total">

<span>Total</span>

<strong id="checkout-total">

Rp 0

</strong>

</div>

<button
class="buy-btn">

Bayar Sekarang

</button>

</div>

</section>

<script src="js/checkout.js"></script>

<script>

lucide.createIcons();

</script>

</body>

</html>
