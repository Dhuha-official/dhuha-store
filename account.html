<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akun | DHUHA</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header>

<div class="logo">
<h1>DHUHA</h1>
</div>

<nav class="nav-icons">

<a href="account.html" class="nav-icon">
<i data-lucide="user"></i>
</a>

</nav>

</header>

<section class="account-page">

<div class="account-header">

<h2 id="welcome-user">Hai, User</h2>

<button class="setting-btn" id="settings-tab">
Pengaturan
</button>

</div>

<div class="account-menu">

<button id="profile-tab" class="menu-btn active">
Profil
</button>

<button id="orders-tab" class="menu-btn">
Pesanan
</button>

<button id="wishlist-tab" class="menu-btn">
Wishlist
</button>

<button id="logout-btn" class="menu-btn">
Logout
</button>

</div>

<div class="profile-card" id="profile-card">

<h2>Info Profil Saya</h2>

<input type="text" id="name" placeholder="Nama Lengkap">

<input type="email" id="email" placeholder="Email" readonly>

<input type="tel" id="phone" placeholder="Nomor WhatsApp">

<div class="birthday">

<div class="account-buttons">
    <button class="account-btn" id="save-profile">
        Simpan Profil
    </button>
</div>
  
<select id="tanggal">
<option>Tanggal</option>
</select>

<select id="bulan">
<option>Bulan</option>
<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>
</select>

<select id="tahun">
<option>Tahun</option>
</select>

</div>

<div class="account-buttons">

<a href="login.html" class="account-btn" id="login-btn">Login</a>

<a href="register.html" class="account-btn" id="register-btn">Daftar</a>

</div>

</div>

<div class="profile-card" id="orders-card" style="display:none;">

<h2>📦 Pesanan Saya</h2> 

<div id="orders-list">

<p>Memuat pesanan...</p>

</div>

</div>

<div class="profile-card" id="settings-card" style="display:none;">

<h2>⚙️ Pengaturan</h2>

<p>Fitur pengaturan akan segera hadir.</p>

</div>

</section>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script>

  async function loadUser() {

    const { data: { user } } =
        await window.supabaseClient.auth.getUser();

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("name").value =
        user.user_metadata?.name || "";

    document.getElementById("email").value =
        user.email;

const { data: profile } = await window.supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

if (profile) {

    document.getElementById("name").value =
        profile.name || "";

    document.getElementById("phone").value =
        profile.phone || "";
    
document.getElementById("welcome-user").textContent =
    "Hai, " + (profile.name || "User");
}
      
    document.getElementById("login-btn").style.display = "none";
    document.getElementById("register-btn").style.display = "none";
}

async function loadOrders() {

const { data: { session } } =
    await window.supabaseClient.auth.getSession();

console.log(session);

const user = session?.user;
    if (!user) return;

    const { data, error } =
        await window.supabaseClient
            .from("orders")
            .select("*")
            .eq("user_id", user.id)
            .order("created_at", {
                ascending: false
            });

    if (error) {
        document.getElementById("orders-list").innerHTML =
            "<p>Gagal memuat pesanan.</p>";
        return;
    }

    if (data.length === 0) {
        document.getElementById("orders-list").innerHTML =
            "<p>Belum ada pesanan.</p>";
        return;
    }

    let html = "";

    data.forEach(order => {

        html += `
        <div class="order-item">

            <h3>${order.product_name}</h3>

            <p>Jumlah : ${order.quantity}</p>

            <p>Total : Rp ${Number(order.total).toLocaleString("id-ID")}</p>

            <p>Status :
            <strong>${order.status}</strong>
            </p>

        </div>
        `;

    });

    document.getElementById("orders-list").innerHTML = html;

}

loadUser();
loadOrders();

document.getElementById("save-profile").addEventListener("click", async () => {

    const { data: { user } } =
        await window.supabaseClient.auth.getUser();

    if (!user) return;

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    const tanggal = document.getElementById("tanggal").value;
    const bulan = document.getElementById("bulan").selectedIndex;
    const tahun = document.getElementById("tahun").value;

    let birth_date = null;

    if (bulan > 0 &&
        tanggal !== "Tanggal" &&
        tahun !== "Tahun") {

        birth_date =
            `${tahun}-${String(bulan).padStart(2, "0")}-${String(tanggal).padStart(2, "0")}`;
    }

    const { error } =
        await window.supabaseClient
            .from("profiles")
            .upsert({
                id: user.id,
                name,
                phone,
                birth_date
            });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Profil berhasil disimpan!");

});
        
  document.getElementById("logout-btn").addEventListener("click", async () => {

    await window.supabaseClient.auth.signOut();

    alert("Logout berhasil");

    window.location.href = "login.html";

});

// Tab Profil
document.getElementById("profile-tab").addEventListener("click", () => {

    document.getElementById("profile-card").style.display = "block";
    document.getElementById("orders-card").style.display = "none";
    document.getElementById("settings-card").style.display = "none";

});

// Tab Pesanan
document.getElementById("orders-tab").addEventListener("click", () => {

    document.getElementById("profile-card").style.display = "none";
    document.getElementById("orders-card").style.display = "block";
    document.getElementById("settings-card").style.display = "none";

});

// Tab Pengaturan
document.getElementById("settings-tab").addEventListener("click", () => {

    document.getElementById("profile-card").style.display = "none";
    document.getElementById("orders-card").style.display = "none";
    document.getElementById("settings-card").style.display = "block";

});

// Isi pilihan tanggal
for (let i = 1; i <= 31; i++) {

    document.getElementById("tanggal").innerHTML +=
        `<option>${i}</option>`;

}

// Isi pilihan tahun
const tahun = new Date().getFullYear();

for (let i = tahun; i >= 1990; i--) {

    document.getElementById("tahun").innerHTML +=
        `<option>${i}</option>`;

  }</script>
<script>
lucide.createIcons();
</script>
    
</body>
</html>
